---
version: "3"

includes:
  pre-commit:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/pre-commit/Taskfile.yml"
  changelog:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/changelog/Taskfile.yml"
  confluence:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/confluence/Taskfile.yml"
  node:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/node/Taskfile.yml"
  python:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/python/Taskfile.yml"
  uv:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/uv/Taskfile.yml"
  pnpm:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/pnpm/Taskfile.yml"
  go:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/go/Taskfile.yml"
  gradle:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/gradle/Taskfile.yml"
  coursier:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/coursier/Taskfile.yml"
  git:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/git/Taskfile.yml"
  docs:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/docs/Taskfile.yml"
  docker:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/docker/Taskfile.yml"
  version:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/version/Taskfile.yml"
  release:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/release/Taskfile.yml"
  opencode:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/opencode/Taskfile.yml"
  biome:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/biomejs/Taskfile.yml"
  bun:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/bun/Taskfile.yml"
  skills:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/skills/Taskfile.yml"
  plantuml:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/plantuml/Taskfile.yml"
  prettier:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/prettier/Taskfile.yml"
  sonar:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/sonar/Taskfile.yml"
  keybase:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/keybase/Taskfile.yml"
  multipass:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/multipass/Taskfile.yml"
  ssh:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/ssh/Taskfile.yml"
  openssl:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/openssl/Taskfile.yml"
  terraform:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/terraform/Taskfile.yml"
  terragrunt:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/terragrunt/Taskfile.yml"
  ansible:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/ansible/Taskfile.yml"
  lua:
    taskfile: "https://raw.githubusercontent.com/InfosisARG/tasks/refs/heads/main/src/lua/Taskfile.yml"
  xelatex: ./provision/task/xelatex.yml


env:
  DOCKER:
    sh: docker --version 2> /dev/null || echo "not exist"
  PYTHON:
    sh: python --version 2> /dev/null || echo "not exist"
  GO:
    sh: go version 2> /dev/null || echo "not exist"
  NODE:
    sh: node --version 2> /dev/null || echo "not exist"
  APP_TAG:
    sh: git describe --tags $(git rev-list --tags --max-count=1) 2> /dev/null || echo "0.0.0"
  README_YAML: provision/generators/README.yaml
  README_TEMPLATE: provision/templates/README.tpl.md
  README_INCLUDES: file://
  TERRAFORM_PATH: ./
  PYTHON_PACKAGE_MANAGER: uv
  SKILL_REPOS:
    https://gitlab.infosisglobal.com/architecture/skills.git

dotenv:
  - .env

vars:
  PROJECT_NAME: resume
  ORGANIZATION: luismayta
  DOCKER_PLATFORM: linux/amd64
  REVIEWERS: luismayta
  PYTHON_VERSION: 3.11.5
  NODE_VERSION: v24.11.1
  GRADLE_VERSION: 8.4.0
  GOLANG_VERSION: 1.24.11
  GIT_IGNORES: python,node,go,zsh,sonar,java,maven,intellij+all,terraform,linux
  COMMIT: $(git rev-parse HEAD)
  RELEASE_DIR: ./release
  DATE: $(date +%s)
  GOLANGCI_VERSION: 1.42.0
  TERRAFORM_VERSION: 1.11.4
  README_FILE: README.md
  # NOTE: Agent workflow conventions live in `infobot.toml`.
  GIT_IGNORES_CUSTOM: |
    bin
    .project
    .scannerwork
    .secrets
    public
    TMP_CHANGELOG.md
    .task
    .terraform.lock.hcl
    build
    .task
    *.lock
    *.lock.hcl
    .cq/
    *.lock
    *.zip
    *.iml
    .external_modules
    .pmd
    vendor
    !uv.lock

tasks:
  default:
    deps:
      - task: check
    cmds:
      - cmd: echo Application {{.PROJECT_NAME}}
        silent: true
      - task: version:default
      - task: summary
      - cmd: task -l
    silent: true

  summary:
    desc: "Summary information"
    cmds:
      - echo Go available {{.GO}}
      - echo Python available {{.PYTHON}}
      - echo Docker available {{.DOCKER}}
      - echo Node available {{.NODE}}
    silent: true

  check:
    desc: "Check all dependencies"
    deps:
      - uv:check
      - pnpm:check
      - changelog:check
      - git:check
      - docs:check
      - opencode:check
      - bun:check
      - skills:check

  readme:
    desc: Generate Readme
    silent: true
    cmds:
      - >-
        gomplate --file {{.README_TEMPLATE}}
        --out {{.README_FILE}}
        --datasource config={{.README_YAML}}
        --datasource includes={{.README_INCLUDES}}
      - task: format

  format:
    desc: Execute format files
    cmds:
      - task: biome:fix
      - task: uv:fmt

  upgrade:
    run: once
    desc: Execute upgrade packages
    cmds:
      - uv update
      - uv run pre-commit autoupdate

  setup:
    desc: Setup dependences of project
    cmds:
      - >-
        [ -e ".env" ] || cp -rf .env.example .env
      - task: uv:setup
      - task: bun:setup
      - task: skills:setup

  environment:
    desc: Setup environment of project
    cmds:
      - task: uv:environment
      - task: pre-commit:setup
      - task: git:setup
      - task: bun:setup
      - task: pnpm:environment

  validate:
    desc: "Run validate on all files"
    cmds:
      - task: pre-commit:lint

  fix:
    desc: "Run fix on all files"
    cmds:
      - task: biome:fix

  test:
    desc: "Run all tests"
    cmds:
      - task: pre-commit:lint

  resume:
    desc: "Generate resume (default: ai-architect-en)"
    cmds:
      - task: xelatex:resume

  resume:profile:
    desc: Generate resume for specific profile and language
    vars:
      PROFILE: '{{.PROFILE | default "ai-architect"}}'
      LANG: '{{.LANG | default "en"}}'
    cmds:
      - cmd: python scripts/generate_resume.py --profile {{.PROFILE}} --lang {{.LANG}}
      - cmd: >-
          docker run
          --platform linux/amd64
          --rm -v "${PWD}":/data
          hadenlabs/xelatex:4.1
          -output-directory=./ resume-{{.PROFILE}}-{{.LANG}}.tex
          -file-line-error -interaction=nonstopmode
        desc: Build PDF for {{.PROFILE}}-{{.LANG}}

  resume:all:
    desc: Generate all 6 resume PDFs
    cmds:
      - cmd: python scripts/generate_resume.py --all
      - cmd: >-
          docker run
          --platform linux/amd64
          --rm -v "${PWD}":/data
          hadenlabs/xelatex:4.1
          -output-directory=./ resume-ai-architect-en.tex
          -file-line-error -interaction=nonstopmode
      - cmd: >-
          docker run
          --platform linux/amd64
          --rm -v "${PWD}":/data
          hadenlabs/xelatex:4.1
          -output-directory=./ resume-ai-architect-es.tex
          -file-line-error -interaction=nonstopmode
      - cmd: >-
          docker run
          --platform linux/amd64
          --rm -v "${PWD}":/data
          hadenlabs/xelatex:4.1
          -output-directory=./ resume-cloud-architect-en.tex
          -file-line-error -interaction=nonstopmode
      - cmd: >-
          docker run
          --platform linux/amd64
          --rm -v "${PWD}":/data
          hadenlabs/xelatex:4.1
          -output-directory=./ resume-cloud-architect-es.tex
          -file-line-error -interaction=nonstopmode
      - cmd: >-
          docker run
          --platform linux/amd64
          --rm -v "${PWD}":/data
          hadenlabs/xelatex:4.1
          -output-directory=./ resume-golang-developer-en.tex
          -file-line-error -interaction=nonstopmode
      - cmd: >-
          docker run
          --platform linux/amd64
          --rm -v "${PWD}":/data
          hadenlabs/xelatex:4.1
          -output-directory=./ resume-golang-developer-es.tex
          -file-line-error -interaction=nonstopmode

  resume:clean:
    desc: Remove generated resume files
    cmds:
      - cmd: rm -f resume-*.tex resume-*.pdf

  help:
    cmds:
      - cmd: |
          echo 'Use "task --list" to get a list of all available tasks with a short description of what they do.'
          echo 'There are some more tasks used as dependencies for other tasks.'
          echo 'You can view them with "task --list-all".'
        silent: true
